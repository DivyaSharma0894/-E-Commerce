version: 2

models:
  - name: sat_order_details
    description: "Satellite containing descriptive state for orders (Append-only CDC)."
    columns:
      - name: hash_order_id
        description: "Foreign Key referencing hub_order."
        tests:
          - not_null
      - name: order_hashdiff
        description: "MD5 hash of all descriptive fields to track changes."
        tests:
          - not_null
      - name: order_amount
        description: "The scalar value of the order."
      - name: ingested_at
        description: "Load Date Timestamp used to identify the latest record."
        tests:
          - not_null