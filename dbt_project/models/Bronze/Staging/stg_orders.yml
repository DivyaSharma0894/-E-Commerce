version: 2

models:
  - name: stg_orders
    description: "Staging model for E-commerce orders."
    columns:
      - name: hash_order_id
        tests:
          - unique
          - not_null
      - name: order_amount
        description: "The total value of the order."
      - name: order_status
        description: "Status of the order (e.g., shipped, delivered)."
      - name: order_hashdiff
        description: "Hash difference for change data capture."
      - name: link_order_customer_pk
        description: "Primary key for the order-customer link."
      - name: source_system
        description: "The system that provided the data."