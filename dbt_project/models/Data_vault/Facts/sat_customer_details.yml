version: 2

models:
  - name: sat_customer_details
    description: "Satellite containing descriptive state for customers (Append-only CDC)."
    columns:
      - name: hash_customer_id
        description: "Foreign Key referencing hub_customer."
        tests:
          - not_null
      - name: customer_hashdiff
        description: "MD5 hash of all descriptive fields to track changes."
        tests:
          - not_null
      - name: customer_name
        description: "The name of the customer."
      - name: email
        description: "The email address of the customer."
      - name: created_at_tz
        description: "Timestamp when the customer was created."
      - name: ingested_at
        description: "Load Date Timestamp used to identify the latest record."
        tests:
          - not_null